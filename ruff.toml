target-version = "py310"
line-length = 120

[lint]
select = [
  "E",    # pycodestyle errors
  "F",    # pyflakes
  "I",    # isort
  "W",    # pycodestyle warnings
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "SIM",  # flake8-simplify
]
ignore = [
  "E501",   # line too long (handled by formatter)
  "B008",   # do not perform function calls in argument defaults (used for argparse)
  "SIM108", # use ternary operator (often less readable for this codebase)
]

[lint.isort]
known-first-party = ["scratch_api"]
